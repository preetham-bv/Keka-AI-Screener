<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles/main.css">
  <style>
    .kb-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      margin-top: 12px;
    }
    .kb-item-title {
      font-weight: 500;
      margin-bottom: 4px;
    }
    .kb-item-desc {
      font-size: 13px;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 8px;
    }
    .kb-item-actions {
      display: flex;
      gap: 8px;
    }
    .kb-item-actions .btn {
      padding: 4px 8px;
      font-size: 12px;
    }
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal.active {
      display: flex;
    }
    .modal-content {
      background: var(--bg);
      width: 400px;
      padding: 24px;
      border-radius: 12px;
      border: 1px solid var(--border);
    }
    textarea {
      resize: vertical;
      min-height: 100px;
    }
    .kb-item {
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 12px;
      background: rgba(255, 255, 255, 0.05);
    }
    .kb-item-title {
      font-weight: 600;
      margin-bottom: 4px;
    }
    .kb-item-desc {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 12px;
      white-space: pre-wrap;
      max-height: 60px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .kb-item-actions {
      display: flex;
      gap: 8px;
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="brand">Knowledge Base</div>
    <div class="nav-links">
      <a href="home.html" class="btn btn-secondary">Home</a>
    </div>
  </nav>

  <div class="container">
    <div class="card glass">
      <div class="card-header" style="display: flex; justify-content: space-between; align-items: center;">
        <h3 class="card-title">Job Descriptions (JDs)</h3>
        <button class="btn btn-sm" id="btn-add-jd">Add JD</button>
      </div>
      <p style="font-size: 13px; color: var(--text-secondary); margin-bottom: 12px;">Save standard job descriptions for reuse.</p>
      <div id="jd-list">
        <!-- JD Items will be rendered here -->
      </div>
    </div>

    <div class="card glass" style="margin-top: 24px;">
      <div class="card-header" style="display: flex; justify-content: space-between; align-items: center;">
        <h3 class="card-title">Evaluation Prompts</h3>
        <button class="btn btn-sm" id="btn-add-prompt">Add Prompt</button>
      </div>
      <p style="font-size: 13px; color: var(--text-secondary); margin-bottom: 12px;">Save and fine-tune your evaluation prompts.</p>
      <div id="prompt-list">
        <!-- Prompt Items will be rendered here -->
      </div>
    </div>
  </div>

  <!-- Add/Edit Modal -->
  <div class="modal" id="kb-modal">
    <div class="modal-content glass">
      <h3 class="card-title" id="modal-title" style="margin-bottom: 16px;">Add Item</h3>
      
      <div class="form-group">
        <label>Title</label>
        <input type="text" id="modal-input-title" placeholder="e.g., Senior Frontend Developer" class="input">
      </div>
      
      <div class="form-group" style="margin-top: 12px;">
        <label>Content</label>
        <textarea id="modal-input-content" placeholder="Enter content here..." class="input"></textarea>
      </div>

      <div id="modal-status" style="margin-top: 8px; font-size: 13px;"></div>

      <div style="display: flex; gap: 12px; margin-top: 24px; justify-content: flex-end;">
        <button class="btn btn-secondary" id="btn-modal-cancel">Cancel</button>
        <button class="btn" id="btn-modal-save">Save</button>
      </div>
    </div>
  </div>
  
  <script type="module" src="knowledge-base.js"></script>
</body>
</html>
