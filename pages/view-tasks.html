<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles/main.css">
  <style>
    .task-card {
      margin-bottom: 16px;
    }
    .task-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
    }
    .task-details {
      display: none;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    .task-details.expanded {
      display: block;
    }
    .status-badge {
      padding: 4px 8px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
    }
    .status-ongoing { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }
    .status-completed { background: rgba(16, 185, 129, 0.2); color: #10b981; }
    .status-cancelled { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
    
    .candidate-list {
      margin-top: 12px;
      max-height: 200px;
      overflow-y: auto;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
    }
    .candidate-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .candidate-row:last-child { border-bottom: none; }
    
    .master-prompt {
      font-size: 12px;
      background: var(--bg);
      padding: 8px;
      border-radius: 8px;
      border: 1px solid var(--border);
      white-space: pre-wrap;
      max-height: 150px;
      overflow-y: auto;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="brand">Tasks</div>
    <div class="nav-links">
      <a href="home.html" class="btn btn-secondary">Home</a>
    </div>
  </nav>

  <div class="container">
    <h3>Active Tasks</h3>
    <div id="active-tasks-container">
      <div class="empty-tasks-msg" style="text-align: center; color: var(--text-secondary); margin-top: 20px;">Loading tasks...</div>
    </div>
    
    <div id="past-tasks-header" class="task-header" style="margin-top: 32px; background: transparent; padding: 0; cursor: pointer; border-bottom: 1px solid var(--border);">
      <h3 style="margin: 0; padding-bottom: 8px;">Past Tasks</h3>
      <div style="display: flex; align-items: center; gap: 12px; padding-bottom: 8px;">
        <button id="btn-clear-past" class="btn btn-secondary" style="padding: 4px 8px; font-size: 11px; color: var(--error); border-color: rgba(239, 68, 68, 0.3);">Clear All</button>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="chevron" style="transition: 0.2s;">
          <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
      </div>
    </div>
    <div id="past-tasks-container" class="hidden" style="margin-top: 16px;">
      <div class="empty-tasks-msg" style="text-align: center; color: var(--text-secondary); margin-top: 20px; font-style: italic; font-size: 13px;">No past tasks</div>
    </div>
  </div>
  
  <style>
    .hidden { display: none !important; }
    .chevron.rotated { transform: rotate(180deg); }
  </style>
  <script type="module" src="view-tasks.js"></script>
</body>
</html>
